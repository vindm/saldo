name: Deploy demo to GitHub Pages

# Renders the SYNTHETIC example instance and publishes it as a live, clickable
# demo at https://<user>.github.io/<repo>/. No generated HTML is committed —
# the dashboards are built fresh from instances/example/data on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Render dashboards (synthetic example instance)
        run: |
          cp config/instance.example.yaml config/instance.yaml
          mkdir -p _site
          # Render straight into _site. ABA_DASHBOARD_DIR pins the output dir so
          # the build does not depend on the default DASHBOARD_DIR location
          # (which now resolves to <data.dir>/dashboards).
          ABA_DASHBOARD_DIR="$GITHUB_WORKSPACE/_site" python3 engine/generate.py

      - name: Assemble site
        run: |
          touch _site/.nojekyll
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=dashboard_overview.html">
            <link rel="canonical" href="dashboard_overview.html">
            <title>Saldo — live demo</title>
            <script>location.replace('dashboard_overview.html');</script>
          </head>
          <body style="font-family:-apple-system,system-ui,sans-serif;padding:2rem">
            Redirecting to the <a href="dashboard_overview.html">Saldo demo dashboard</a>…
          </body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
